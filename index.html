<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kreator Kolorowanek KDP Pro</title>
    
    <link rel="icon" type="image/png" href="icon.png">
    <link rel="apple-touch-icon" href="icon.png">

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-amber-50 text-slate-900 font-sans">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useRef, useEffect } = React;

        const IconPalette = () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="13.5" cy="6.5" r=".5" fill="currentColor"/><circle cx="17.5" cy="10.5" r=".5" fill="currentColor"/><circle cx="8.5" cy="7.5" r=".5" fill="currentColor"/><circle cx="6.5" cy="12.5" r=".5" fill="currentColor"/><path d="M12 2C6.5 2 2 6.5 2 12s4.5 10 10 10c.926 0 1.648-.746 1.648-1.688 0-.437-.18-.835-.437-1.125-.29-.289-.438-.652-.438-1.125a1.64 1.64 0 0 1 1.668-1.668h1.996c3.051 0 5.555-2.503 5.555-5.554C21.965 6.012 17.461 2 12 2z"/></svg>;
        const IconDownload = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" x2="12" y1="15" y2="3"/></svg>;
        const IconCoffee = () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M17 8h1a4 4 0 1 1 0 8h-1"/><path d="M3 8h14v9a4 4 0 0 1-4 4H7a4 4 0 0 1-4-4Z"/><line x1="6" x2="6" y1="2" y2="4"/><line x1="10" x2="10" y1="2" y2="4"/><line x1="14" x2="14" y1="2" y2="4"/></svg>;
        const IconLoader = () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="animate-spin"><path d="M21 12a9 9 0 1 1-6.219-8.56"/></svg>;
        const IconPrinter = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect width="12" height="8" x="6" y="14"/></svg>;
        const IconLock = () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect width="18" height="11" x="3" y="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>;

        const App = () => {
            const canvasRef = useRef(null);
            const [hfToken, setHfToken] = useState(() => localStorage.getItem('hf_api_token') || '');
            const [prompt, setPrompt] = useState('');
            const [complexity, setComplexity] = useState('simple'); 
            const [image, setImage] = useState(null); 
            const [isGenerating, setIsGenerating] = useState(false);
            const [retryCount, setRetryCount] = useState(0); 
            const [error, setError] = useState(null);

            const saveToken = (e) => {
                const val = e.target.value;
                setHfToken(val);
                localStorage.setItem('hf_api_token', val);
            };

            const drawCanvas = () => {
                const canvas = canvasRef.current;
                if (!canvas) return;
                const ctx = canvas.getContext('2d');
                const width = canvas.width;
                const height = canvas.height;

                ctx.fillStyle = "#ffffff";
                ctx.fillRect(0, 0, width, height);

                if (image) {
                    const margin = 40;
                    const drawWidth = width - (margin * 2);
                    const drawHeight = drawWidth * (image.height / image.width);
                    const x = margin;
                    const y = (height - drawHeight) / 2;
                    ctx.drawImage(image, x, y, drawWidth, drawHeight);
                } else {
                    ctx.fillStyle = '#cbd5e1';
                    ctx.font = '24px sans-serif';
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    ctx.fillText("Tutaj pojawi się Twoja kolorowanka", width / 2, height / 2);
                }
            };

            useEffect(() => {
                drawCanvas();
            }, [image]);

            // OFICJALNE POŁĄCZENIE Z HUGGING FACE API (Otwarty model SDXL - brak blokad licencyjnych!)
            const fetchImageFromHuggingFace = async (promptText, maxRetries = 2) => {
                const hfEndpoint = "https://api-inference.huggingface.co/models/stabilityai/stable-diffusion-xl-base-1.0";
                
                for (let i = 0; i < maxRetries; i++) {
                    setRetryCount(i);
                    try {
                        const response = await fetch(hfEndpoint, {
                            method: "POST",
                            headers: {
                                "Authorization": `Bearer ${hfToken.trim()}`,
                                "Content-Type": "application/json",
                            },
                            body: JSON.stringify({ 
                                inputs: promptText,
                            }),
                        });

                        if (response.status === 503) {
                            console.log("Model ładuje się, czekam 10 sekund...");
                            await new Promise(r => setTimeout(r, 10000));
                            continue;
                        }

                        if (!response.ok) {
                            const errText = await response.text();
                            console.error("HF Error Details:", errText);
                            if (response.status === 401 || response.status === 403) {
                                throw new Error("Klucz API nie ma uprawnień lub jest błędny. Upewnij się, że zaznaczyłeś 'Make calls to the serverless Inference API'.");
                            }
                            throw new Error(`Błąd serwera API (Kod: ${response.status})`);
                        }

                        const blob = await response.blob();
                        const objectUrl = URL.createObjectURL(blob);
                        
                        const img = new Image();
                        await new Promise((resolve, reject) => {
                            img.onload = () => resolve(img);
                            img.onerror = () => reject(new Error("Błąd podczas renderowania obrazka"));
                            img.src = objectUrl;
                        });

                        return img; 

                    } catch (err) {
                        if (err.message === "Failed to fetch" || err.message.includes("NetworkError")) {
                            throw new Error("Wystąpił błąd połączenia (Failed to fetch). Upewnij się, że klucz zaczyna się od 'hf_' i nie ma w nim spacji.");
                        }
                        
                        if (i === maxRetries - 1) throw err; 
                        await new Promise(res => setTimeout(res, 3000));
                    }
                }
            };

            const generateColoringPage = async () => {
                if (!hfToken || !hfToken.startsWith('hf_')) {
                    setError("Wklej poprawny darmowy klucz Hugging Face (powinien zaczynać się od hf_...)");
                    return;
                }
                if (!prompt.trim()) {
                    setError("Wpisz najpierw, co sztuczna inteligencja ma narysować!");
                    return;
                }

                setIsGenerating(true);
                setError(null);
                setRetryCount(0);

                // PROMPT DLA SDXL
                const complexityInstruction = complexity === 'simple' ? 'very simple, thick bold outlines, minimal details, suitable for kids coloring book' : 'highly detailed, fine thin outlines, intricate patterns, suitable for adult coloring book';
                const enhancedPrompt = `black and white line art coloring page, no shading, strict white background, clean black outlines, ${complexityInstruction}, ${prompt}`;

                try {
                    const finalImage = await fetchImageFromHuggingFace(enhancedPrompt, 3);
                    setImage(finalImage);
                } catch (err) {
                    setError(err.message || "Błąd generowania. Spróbuj ponownie.");
                } finally {
                    setIsGenerating(false);
                    setRetryCount(0);
                }
            };

            const handleDownload = () => {
                const canvas = canvasRef.current;
                if (!canvas || !image) {
                    setError("Wygeneruj obrazek przed pobraniem.");
                    return;
                }
                const dataUrl = canvas.toDataURL('image/png');
                const link = document.createElement('a');
                link.download = `kolorowanka-${prompt.replace(/\s+/g, '-').toLowerCase().substring(0, 15)}.png`;
                link.href = dataUrl;
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
            };

            const handlePrint = () => {
                if (!image) {
                    setError("Wygeneruj obrazek przed drukiem.");
                    return;
                }
                const dataUrl = canvasRef.current.toDataURL('image/png');
                const printWindow = window.open('', '_blank');
                printWindow.document.write(`
                    <html>
                        <head><title>Drukuj Kolorowankę</title></head>
                        <body style="margin:0;display:flex;justify-content:center;align-items:center;height:100vh;">
                            <img src="${dataUrl}" style="max-width:100%;max-height:100vh;"/>
                        </body>
                    </html>
                `);
                printWindow.document.close();
                printWindow.focus();
                setTimeout(() => {
                    printWindow.print();
                    printWindow.close();
                }, 250);
            };

            return (
                <div className="min-h-screen p-4 md:p-8 max-w-7xl mx-auto flex flex-col md:flex-row gap-8">
                    
                    {/* LEWY PANEL - Kontrolki */}
                    <div className="w-full md:w-1/3 flex flex-col gap-5">
                        <div className="bg-white p-6 rounded-3xl shadow-lg border border-amber-100">
                            <div className="flex items-center gap-3 mb-2">
                                <div className="p-3 bg-amber-500 rounded-xl text-white shadow-md">
                                    <IconPalette />
                                </div>
                                <h1 className="text-2xl font-black text-slate-800 tracking-tight">KDP ColorAI</h1>
                            </div>
                            <p className="text-sm text-slate-500 mb-6 font-medium">Potężny kreator napędzany darmowym modelem SDXL.</p>

                            {error && (
                                <div className="bg-red-50 text-red-600 p-4 rounded-xl text-sm font-medium mb-4 flex items-start gap-2 border border-red-100 shadow-sm whitespace-pre-wrap">
                                    <span className="text-lg mt-0.5">⚠️</span> <span className="flex-1 leading-relaxed">{error}</span>
                                </div>
                            )}

                            {/* POLE NA KLUCZ HUGGING FACE */}
                            <div className="bg-indigo-50 border border-indigo-200 p-4 rounded-xl flex flex-col items-start gap-2 mb-6 shadow-inner">
                                <div className="flex items-center gap-2 text-indigo-800">
                                    <IconLock />
                                    <span className="text-sm font-bold">Klucz API (Hugging Face):</span>
                                </div>
                                <input 
                                    type="password" 
                                    value={hfToken} 
                                    onChange={saveToken} 
                                    placeholder="Wklej darmowy klucz hf_..." 
                                    className="w-full px-4 py-2 border border-indigo-200 rounded-lg text-sm outline-none focus:ring-2 focus:ring-indigo-500 font-mono bg-white shadow-sm"
                                />
                                <div className="text-[11px] text-indigo-700 mt-1 space-y-1">
                                    <p>Utworzyłeś klucz "Fine-grained" z opcją Wnioskowania. Jesteś gotowy do pracy!</p>
                                </div>
                            </div>

                            <div className="space-y-5">
                                <div className="space-y-2">
                                    <label className="text-xs font-bold text-slate-500 uppercase tracking-wider">Co chcesz narysować?</label>
                                    <textarea 
                                        rows="3"
                                        value={prompt}
                                        onChange={(e) => setPrompt(e.target.value)}
                                        placeholder="np. mały dinozaur bawiący się piłką"
                                        className="w-full px-4 py-3 border border-slate-200 rounded-xl focus:ring-2 focus:ring-amber-500 bg-slate-50 outline-none resize-none shadow-inner"
                                    />
                                </div>

                                <div className="space-y-2">
                                    <label className="text-xs font-bold text-slate-500 uppercase tracking-wider">Poziom skomplikowania</label>
                                    <div className="flex bg-slate-100 p-1 rounded-xl">
                                        <button 
                                            onClick={() => setComplexity('simple')}
                                            className={`flex-1 py-2 text-sm font-bold rounded-lg transition-all ${complexity === 'simple' ? 'bg-white shadow text-amber-600' : 'text-slate-500 hover:text-slate-700'}`}
                                        >
                                            Dla Dzieci (Proste)
                                        </button>
                                        <button 
                                            onClick={() => setComplexity('detailed')}
                                            className={`flex-1 py-2 text-sm font-bold rounded-lg transition-all ${complexity === 'detailed' ? 'bg-white shadow text-amber-600' : 'text-slate-500 hover:text-slate-700'}`}
                                        >
                                            Dla Dorosłych (Detale)
                                        </button>
                                    </div>
                                </div>

                                <button 
                                    onClick={generateColoringPage}
                                    disabled={isGenerating || !prompt.trim() || !hfToken}
                                    className="w-full flex justify-center items-center gap-2 bg-amber-500 hover:bg-amber-600 disabled:bg-slate-300 text-white py-4 rounded-xl font-bold text-lg transition-all shadow-lg shadow-amber-500/30"
                                >
                                    {isGenerating ? <><IconLoader /> Tworzenie...</> : "Generuj Kolorowankę"}
                                </button>
                            </div>
                        </div>
                    </div>

                    {/* PRAWY PANEL - Płótno A4 */}
                    <div className="w-full md:w-2/3 flex flex-col items-center">
                        <div className="w-full max-w-lg flex justify-between items-center mb-4 px-2">
                            <h2 className="font-bold text-slate-700">Podgląd (Proporcje A4)</h2>
                            <div className="flex gap-2">
                                <button onClick={handlePrint} disabled={!image} className="flex items-center gap-1.5 px-3 py-1.5 bg-slate-200 hover:bg-slate-300 disabled:opacity-50 text-slate-700 font-bold rounded-lg text-sm transition-colors">
                                    <IconPrinter /> Drukuj
                                </button>
                                <button onClick={handleDownload} disabled={!image} className="flex items-center gap-1.5 px-3 py-1.5 bg-amber-500 hover:bg-amber-600 disabled:bg-amber-200 disabled:text-amber-50 text-white font-bold rounded-lg text-sm transition-colors shadow-md shadow-amber-500/30">
                                    <IconDownload /> Pobierz
                                </button>
                            </div>
                        </div>

                        {/* Płótno Canvas */}
                        <div className="relative group shadow-2xl rounded-sm overflow-hidden border border-slate-200 bg-white" style={{ width: '100%', maxWidth: '500px', aspectRatio: '1 / 1.414' }}>
                            {isGenerating && (
                                <div className="absolute inset-0 z-20 bg-white/95 flex flex-col items-center justify-center">
                                    <div className="text-amber-500 mb-3"><IconLoader /></div>
                                    <p className="font-bold text-slate-800 text-center">Inicjowanie SDXL...</p>
                                    {retryCount > 0 ? (
                                        <p className="text-xs text-amber-600 mt-2 font-bold px-4 text-center">Darmowy model się wybudza (może zająć do 30 sek)...</p>
                                    ) : (
                                        <p className="text-xs text-slate-500 mt-1">Nanoszenie tuszu na płótno</p>
                                    )}
                                </div>
                            )}
                            <canvas 
                                ref={canvasRef} 
                                width={1200} 
                                height={1697} 
                                className="w-full h-full object-contain"
                            ></canvas>
                        </div>
                    </div>

                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
