<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KDP ColorAI - Stabilny Generator</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React i ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <!-- Babel -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-[#fffbeb] text-slate-900 font-sans">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // Ikony
        const IconPalette = () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="13.5" cy="6.5" r=".5" fill="currentColor"/><circle cx="17.5" cy="10.5" r=".5" fill="currentColor"/><circle cx="8.5" cy="7.5" r=".5" fill="currentColor"/><circle cx="6.5" cy="12.5" r=".5" fill="currentColor"/><path d="M12 2C6.5 2 2 6.5 2 12s4.5 10 10 10c.926 0 1.648-.746 1.648-1.688 0-.437-.18-.835-.437-1.125-.29-.289-.438-.652-.438-1.125a1.64 1.64 0 0 1 1.668-1.668h1.996c3.051 0 5.555-2.503 5.555-5.554C21.965 6.012 17.461 2 12 2z"/></svg>;
        const IconDownload = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" x2="12" y1="15" y2="3"/></svg>;
        const IconCoffee = () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M17 8h1a4 4 0 1 1 0 8h-1"/><path d="M3 8h14v9a4 4 0 0 1-4 4H7a4 4 0 0 1-4-4Z"/><line x1="6" x2="6" y1="2" y2="4"/><line x1="10" x2="10" y1="2" y2="4"/><line x1="14" x2="14" y1="2" y2="4"/></svg>;
        const IconLoader = () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="animate-spin"><path d="M21 12a9 9 0 1 1-6.219-8.56"/></svg>;

        const App = () => {
            const [prompt, setPrompt] = useState('');
            const [complexity, setComplexity] = useState('simple'); 
            const [imageUrl, setImageUrl] = useState(null); 
            const [isGenerating, setIsGenerating] = useState(false);
            const [retryCount, setRetryCount] = useState(0);
            const [error, setError] = useState(null);

            const generate = () => {
                if (!prompt.trim()) {
                    setError("Wpisz temat kolorowanki.");
                    return;
                }
                setError(null);
                setIsGenerating(true);
                setRetryCount(0);
                
                const style = complexity === 'simple' ? 'very simple bold line art, thick outlines, minimal details, for toddlers' : 'intricate detailed line art, fine lines, patterns, for adult coloring book';
                const finalPrompt = `${prompt}, black and white, coloring book page, clean white background, strictly black lines, no shading, no colors, ${style}`;
                
                const seed = Math.floor(Math.random() * 1000000);
                setImageUrl(`https://image.pollinations.ai/prompt/${encodeURIComponent(finalPrompt)}?width=800&height=1100&seed=${seed}`);
            };

            const handleImageError = () => {
                if (retryCount < 3) {
                    setRetryCount(prev => prev + 1);
                    // Automatyczne ponowienie z innym seedem po 2 sekundach
                    setTimeout(() => generate(), 2000);
                } else {
                    setIsGenerating(false);
                    setError("Serwer AI ma teraz przerwę techniczną. Kliknij przycisk poniżej, by spróbować otworzyć bezpośrednio.");
                }
            };

            return (
                <div className="min-h-screen p-4 md:p-10 max-w-6xl mx-auto flex flex-col md:flex-row gap-10">
                    
                    {/* LEWA STRONA: MENU */}
                    <div className="w-full md:w-80 flex flex-col gap-6">
                        <div className="bg-white p-8 rounded-[2rem] shadow-xl border border-amber-100">
                            <div className="flex items-center gap-3 mb-6">
                                <div className="p-3 bg-amber-500 rounded-2xl text-white shadow-lg shadow-amber-200">
                                    <IconPalette />
                                </div>
                                <h1 className="text-2xl font-black text-slate-800 tracking-tight">KDP Pro</h1>
                            </div>

                            {error && (
                                <div className="bg-red-50 text-red-600 p-4 rounded-xl text-xs font-bold mb-6 border border-red-100 leading-relaxed">
                                    {error}
                                    {imageUrl && (
                                        <a href={imageUrl} target="_blank" className="block mt-2 underline text-red-800">Otwórz obrazek w nowym oknie &rarr;</a>
                                    )}
                                </div>
                            )}

                            <div className="space-y-6">
                                <div>
                                    <label className="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-2 block">Temat kolorowanki</label>
                                    <textarea 
                                        rows="3"
                                        value={prompt}
                                        onChange={(e) => setPrompt(e.target.value)}
                                        className="w-full px-4 py-3 border border-slate-200 rounded-2xl bg-slate-50 outline-none focus:ring-2 focus:ring-amber-500 transition-all text-sm"
                                        placeholder="np. uroczy kotek w kosmosie"
                                    />
                                </div>

                                <div>
                                    <label className="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-2 block">Poziom trudności</label>
                                    <div className="flex bg-slate-100 p-1.5 rounded-2xl">
                                        <button onClick={() => setComplexity('simple')} className={`flex-1 py-2 text-xs font-bold rounded-xl transition-all ${complexity === 'simple' ? 'bg-white shadow text-amber-600' : 'text-slate-500'}`}>Dzieci</button>
                                        <button onClick={() => setComplexity('detailed')} className={`flex-1 py-2 text-xs font-bold rounded-xl transition-all ${complexity === 'detailed' ? 'bg-white shadow text-amber-600' : 'text-slate-500'}`}>Dorośli</button>
                                    </div>
                                </div>

                                <button 
                                    onClick={generate}
                                    disabled={isGenerating || !prompt.trim()}
                                    className="w-full flex justify-center items-center gap-2 bg-amber-500 hover:bg-amber-600 disabled:bg-slate-300 text-white py-4 rounded-2xl font-bold text-lg shadow-lg shadow-amber-500/30 transition-all hover:-translate-y-0.5"
                                >
                                    {isGenerating ? <><IconLoader /> Rysowanie...</> : "Generuj Szkic"}
                                </button>
                                <p className="text-[10px] text-center text-slate-400 leading-tight italic">
                                    Darmowe AI bywa kapryśne. Jeśli nie zadziała za 1 razem, spróbuj ponownie za chwilę.
                                </p>
                            </div>
                        </div>

                        {/* NAPIWEK */}
                        <div className="bg-slate-900 p-6 rounded-[2rem] text-white shadow-xl mt-auto">
                            <h3 className="font-bold mb-2 flex items-center gap-2 text-amber-400">
                                <IconCoffee /> Postaw mi kawę
                            </h3>
                            <p className="text-[11px] text-slate-400 mb-4 leading-relaxed">
                                Ta aplikacja jest darmowa. Każda "wirtualna kawa" pomaga mi tworzyć kolejne narzędzia dla Ciebie!
                            </p>
                            <a href="https://buycoffee.to/TWOJA_NAZWA" target="_blank" className="w-full flex items-center justify-center gap-2 bg-[#ffdd00] hover:bg-[#e6c700] text-black py-3 rounded-xl font-bold text-sm transition-colors">
                                Wyślij wsparcie (BLIK)
                            </a>
                        </div>
                    </div>

                    {/* PRAWA STRONA: PODGLĄD */}
                    <div className="flex-1 flex flex-col items-center">
                        <div className="w-full max-w-[500px] flex justify-between items-center mb-4">
                            <h2 className="font-bold text-slate-700 tracking-tight uppercase text-sm">Podgląd strony A4</h2>
                            {imageUrl && !isGenerating && (
                                <div className="flex gap-2">
                                    <a href={imageUrl} target="_blank" className="px-4 py-2 bg-white border border-slate-200 rounded-xl text-xs font-bold flex items-center gap-2 shadow-sm hover:bg-slate-50">
                                        <IconDownload /> Pobierz do druku
                                    </a>
                                </div>
                            )}
                        </div>

                        <div className="relative w-full max-w-[500px] aspect-[1/1.41] bg-white rounded-sm shadow-2xl border border-slate-200 flex items-center justify-center overflow-hidden group">
                            {isGenerating && (
                                <div className="absolute inset-0 z-10 bg-white/95 flex flex-col items-center justify-center p-10 text-center">
                                    <div className="text-amber-500 mb-4 scale-150"><IconLoader /></div>
                                    <p className="font-bold text-slate-800">Sztuczna Inteligencja rysuje Twoją stronę...</p>
                                    <p className="text-xs text-slate-400 mt-2">Darmowe serwery mogą potrzebować do 10-15 sekund.</p>
                                </div>
                            )}

                            {imageUrl ? (
                                <img 
                                    src={imageUrl} 
                                    alt="Twoja kolorowanka" 
                                    className={`w-full h-full object-contain transition-opacity duration-500 ${isGenerating ? 'opacity-0' : 'opacity-100'}`}
                                    onLoad={() => {
                                        setIsGenerating(false);
                                        setError(null);
                                    }}
                                    onError={handleImageError}
                                />
                            ) : (
                                <div className="text-slate-300 text-center p-10 select-none">
                                    <div className="mb-4 opacity-20"><IconPalette /></div>
                                    <p className="text-sm font-medium italic">Wpisz temat po lewej i kliknij "Generuj",<br/>aby stworzyć swoją pierwszą kolorowankę KDP.</p>
                                </div>
                            )}
                        </div>
                        <p className="mt-6 text-[11px] text-slate-400 font-medium">Proporcje dostosowane do standardowego druku Amazon KDP (8.5 x 11 in / A4).</p>
                    </div>

                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
