<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kreator Kolorowanek KDP</title>
    
    <!-- Aktywacja ikony aplikacji -->
    <link rel="icon" type="image/png" href="icon.png">
    <link rel="apple-touch-icon" href="icon.png">

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React i ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <!-- Babel -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-amber-50 text-slate-900 font-sans">
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        // Ikony SVG
        const IconPalette = () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="13.5" cy="6.5" r=".5" fill="currentColor"/><circle cx="17.5" cy="10.5" r=".5" fill="currentColor"/><circle cx="8.5" cy="7.5" r=".5" fill="currentColor"/><circle cx="6.5" cy="12.5" r=".5" fill="currentColor"/><path d="M12 2C6.5 2 2 6.5 2 12s4.5 10 10 10c.926 0 1.648-.746 1.648-1.688 0-.437-.18-.835-.437-1.125-.29-.289-.438-.652-.438-1.125a1.64 1.64 0 0 1 1.668-1.668h1.996c3.051 0 5.555-2.503 5.555-5.554C21.965 6.012 17.461 2 12 2z"/></svg>;
        const IconDownload = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" x2="12" y1="15" y2="3"/></svg>;
        const IconCoffee = () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M17 8h1a4 4 0 1 1 0 8h-1"/><path d="M3 8h14v9a4 4 0 0 1-4 4H7a4 4 0 0 1-4-4Z"/><line x1="6" x2="6" y1="2" y2="4"/><line x1="10" x2="10" y1="2" y2="4"/><line x1="14" x2="14" y1="2" y2="4"/></svg>;
        const IconLoader = () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="animate-spin"><path d="M21 12a9 9 0 1 1-6.219-8.56"/></svg>;
        const IconPrinter = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect width="12" height="8" x="6" y="14"/></svg>;

        const App = () => {
            const [prompt, setPrompt] = useState('');
            const [complexity, setComplexity] = useState('simple'); 
            
            // Stany dla obrazka
            const [imageUrl, setImageUrl] = useState(null); 
            const [isLoadingImage, setIsLoadingImage] = useState(false);
            const [retryCount, setRetryCount] = useState(0); 
            const [error, setError] = useState(null);
            
            // Stany zapasowe
            const [currentEncodedPrompt, setCurrentEncodedPrompt] = useState('');
            const [directFallbackUrl, setDirectFallbackUrl] = useState(null);

            // Funkcja ustawiająca link (Przeglądarka sama to wczyta jako standardowy obrazek)
            const triggerImageLoad = (encoded, attempt) => {
                setIsLoadingImage(true);
                const seed = Math.floor(Math.random() * 1000000);
                const url = `https://image.pollinations.ai/prompt/${encoded}?width=800&height=1131&seed=${seed}`;
                
                setImageUrl(url); // Aktualizacja stanu natychmiast wrzuca link do tagu <img>
                setDirectFallbackUrl(`https://image.pollinations.ai/prompt/${encoded}?width=800&height=1131`);
            };

            // GENEROWANIE
            const generateColoringPage = () => {
                if (!prompt.trim()) {
                    setError("Wpisz najpierw, co sztuczna inteligencja ma narysować!");
                    return;
                }

                setRetryCount(0);
                setError(null);
                setDirectFallbackUrl(null);

                const complexityInstruction = complexity === 'simple' ? 'very simple, thick bold outlines, minimal details, suitable for toddlers' : 'detailed, fine outlines, intricate patterns, suitable for adults';
                const enhancedPrompt = `${prompt}, black and white line art, coloring book page style, clean white background, strictly black lines, no shading, no greyscale, no colors, ${complexityInstruction}`;
                const encodedPrompt = encodeURIComponent(enhancedPrompt);
                
                setCurrentEncodedPrompt(encodedPrompt);
                triggerImageLoad(encodedPrompt, 0);
            };

            // Sukces ładowania przeglądarki
            const handleImageLoad = () => {
                setIsLoadingImage(false);
                setRetryCount(0);
                setError(null);
            };

            // Błąd ładowania przeglądarki (uruchamia system ponawiania)
            const handleImageError = () => {
                if (retryCount < 2) {
                    const nextAttempt = retryCount + 1;
                    setRetryCount(nextAttempt);
                    setTimeout(() => triggerImageLoad(currentEncodedPrompt, nextAttempt), 2000);
                } else {
                    // Po 3 nieudanych próbach poddajemy się i dajemy użytkownikowi link bezpośredni
                    setIsLoadingImage(false);
                    setError("Przeglądarka zablokowała automatyczne wyświetlenie obrazka. Użyj przycisku poniżej, aby wygenerować go bezpośrednio w nowej karcie.");
                }
            };

            // BEZPIECZNE POBIERANIE DO PLIKU
            const handleDownload = async () => {
                if (!imageUrl) return;
                try {
                    // Darmowe proxy ułatwiające pobieranie bez błędów CORS
                    const response = await fetch(`https://api.allorigins.win/raw?url=${encodeURIComponent(imageUrl)}`);
                    const blob = await response.blob();
                    const objectUrl = URL.createObjectURL(blob);
                    
                    const link = document.createElement('a');
                    link.download = `kolorowanka-${prompt.replace(/\s+/g, '-').toLowerCase().substring(0, 15)}.jpg`;
                    link.href = objectUrl;
                    document.body.appendChild(link);
                    link.click();
                    document.body.removeChild(link);
                    URL.revokeObjectURL(objectUrl);
                } catch (err) {
                    // Jeśli proxy padnie, po prostu otwieramy w nowej karcie (użytkownik pobierze prawym przyciskiem myszy)
                    window.open(imageUrl, '_blank');
                }
            };

            // DRUKOWANIE
            const handlePrint = () => {
                if (!imageUrl) return;
                const printWindow = window.open('', '_blank');
                printWindow.document.write(`
                    <html>
                        <head><title>Drukuj Kolorowankę</title></head>
                        <body style="margin:0;display:flex;justify-content:center;align-items:center;height:100vh;">
                            <img src="${imageUrl}" style="max-width:100%;max-height:100vh;" onload="window.print();window.close();" />
                        </body>
                    </html>
                `);
                printWindow.document.close();
                printWindow.focus();
            };

            return (
                <div className="min-h-screen p-4 md:p-8 max-w-7xl mx-auto flex flex-col md:flex-row gap-8">
                    
                    {/* LEWY PANEL - Kontrolki */}
                    <div className="w-full md:w-1/3 flex flex-col gap-6">
                        <div className="bg-white p-6 rounded-3xl shadow-lg border border-amber-100">
                            <div className="flex items-center gap-3 mb-2">
                                <div className="p-3 bg-amber-500 rounded-xl text-white shadow-md">
                                    <IconPalette />
                                </div>
                                <h1 className="text-2xl font-black text-slate-800 tracking-tight">KDP ColorAI</h1>
                            </div>
                            <p className="text-sm text-slate-500 mb-6 font-medium">Darmowy kreator kolorowanek do pobrania i druku.</p>

                            {/* Wyświetlanie błędu z PRZYCISKIEM OSTATECZNYM */}
                            {error && (
                                <div className="bg-red-50 text-red-600 p-4 rounded-xl text-sm font-medium mb-4 flex flex-col gap-3 border border-red-100 shadow-sm">
                                    <div className="flex items-start gap-2">
                                        <span className="text-xl mt-0.5">⚠️</span> <span className="flex-1 leading-tight">{error}</span>
                                    </div>
                                    {directFallbackUrl && (
                                        <a 
                                            href={directFallbackUrl} 
                                            target="_blank" 
                                            rel="noopener noreferrer" 
                                            className="w-full bg-red-600 hover:bg-red-700 text-white text-center py-2.5 rounded-lg font-bold transition-colors shadow-md flex items-center justify-center gap-2"
                                        >
                                            Otwórz obrazek w nowej karcie
                                        </a>
                                    )}
                                </div>
                            )}

                            <div className="space-y-5">
                                <div className="space-y-2">
                                    <label className="text-xs font-bold text-slate-500 uppercase tracking-wider">Co chcesz narysować?</label>
                                    <textarea 
                                        rows="3"
                                        value={prompt}
                                        onChange={(e) => setPrompt(e.target.value)}
                                        placeholder="np. uroczy lisek śpiący na chmurce"
                                        className="w-full px-4 py-3 border border-slate-200 rounded-xl focus:ring-2 focus:ring-amber-500 bg-slate-50 outline-none resize-none shadow-inner"
                                    />
                                </div>

                                <div className="space-y-2">
                                    <label className="text-xs font-bold text-slate-500 uppercase tracking-wider">Poziom skomplikowania</label>
                                    <div className="flex bg-slate-100 p-1 rounded-xl">
                                        <button 
                                            onClick={() => setComplexity('simple')}
                                            className={`flex-1 py-2 text-sm font-bold rounded-lg transition-all ${complexity === 'simple' ? 'bg-white shadow text-amber-600' : 'text-slate-500 hover:text-slate-700'}`}
                                        >
                                            Proste (Dzieci)
                                        </button>
                                        <button 
                                            onClick={() => setComplexity('detailed')}
                                            className={`flex-1 py-2 text-sm font-bold rounded-lg transition-all ${complexity === 'detailed' ? 'bg-white shadow text-amber-600' : 'text-slate-500 hover:text-slate-700'}`}
                                        >
                                            Detale (Dorośli)
                                        </button>
                                    </div>
                                </div>

                                <button 
                                    onClick={generateColoringPage}
                                    disabled={isLoadingImage || !prompt.trim()}
                                    className="w-full flex justify-center items-center gap-2 bg-amber-500 hover:bg-amber-600 disabled:bg-slate-300 text-white py-4 rounded-xl font-bold text-lg transition-all shadow-lg shadow-amber-500/30"
                                >
                                    {isLoadingImage ? <><IconLoader /> Tworzenie...</> : "Generuj Kolorowankę"}
                                </button>
                                <p className="text-[10px] text-center text-slate-400 mt-2">Działa jak zwykłe zdjęcie. Brak blokad i błędów CORS.</p>
                            </div>
                        </div>

                        {/* MODUŁ "ZARABIANIA" / NAPIWKÓW */}
                        <div className="bg-slate-800 p-6 rounded-3xl text-white shadow-xl relative overflow-hidden mt-auto hidden md:block">
                            <div className="absolute -right-6 -top-6 w-24 h-24 bg-amber-500 rounded-full blur-2xl opacity-20"></div>
                            <h3 className="font-bold text-lg mb-2 relative z-10">Wspieraj projekt!</h3>
                            <p className="text-sm text-slate-300 mb-4 relative z-10">Ta aplikacja jest w 100% darmowa i działa bez logowania. Jeśli oszczędziła Ci czas, ufunduj mi wirtualną kawę!</p>
                            
                            <div className="bg-slate-700/80 backdrop-blur border border-slate-600 rounded-xl p-4 relative z-10">
                                {/* ZMIEŃ TEN LINK PONIŻEJ NA SWÓJ LINK BUYCOFFEE */}
                                <a 
                                    href="https://buycoffee.to/TWOJA_NAZWA" 
                                    target="_blank"
                                    rel="noopener noreferrer"
                                    className="w-full flex items-center justify-center gap-2 bg-[#ffdd00] hover:bg-[#e6c700] text-black py-2.5 rounded-lg font-bold text-sm transition-colors shadow-md"
                                >
                                    <IconCoffee /> Postaw twórcy kawę
                                </a>
                            </div>
                        </div>
                    </div>

                    {/* PRAWY PANEL - Obrazek A4 */}
                    <div className="w-full md:w-2/3 flex flex-col items-center">
                        <div className="w-full max-w-lg flex justify-between items-center mb-4 px-2">
                            <h2 className="font-bold text-slate-700">Podgląd (Proporcje A4)</h2>
                            <div className="flex gap-2">
                                <button onClick={handlePrint} disabled={!imageUrl || isLoadingImage} className="flex items-center gap-1.5 px-3 py-1.5 bg-slate-200 hover:bg-slate-300 disabled:opacity-50 text-slate-700 font-bold rounded-lg text-sm transition-colors">
                                    <IconPrinter /> Drukuj
                                </button>
                                <button onClick={handleDownload} disabled={!imageUrl || isLoadingImage} className="flex items-center gap-1.5 px-3 py-1.5 bg-amber-500 hover:bg-amber-600 disabled:bg-amber-200 disabled:text-amber-50 text-white font-bold rounded-lg text-sm transition-colors shadow-md shadow-amber-500/30">
                                    <IconDownload /> Pobierz
                                </button>
                            </div>
                        </div>

                        {/* Bezpośredni tag IMG renderowany natywnie przez przeglądarkę */}
                        <div className="relative group shadow-2xl rounded-sm overflow-hidden border border-slate-200 bg-white flex items-center justify-center" style={{ width: '100%', maxWidth: '500px', aspectRatio: '1 / 1.414' }}>
                            {isLoadingImage && (
                                <div className="absolute inset-0 z-20 bg-white/95 flex flex-col items-center justify-center">
                                    <div className="text-amber-500 mb-3"><IconLoader /></div>
                                    <p className="font-bold text-slate-800">Magia w toku...</p>
                                    {retryCount > 0 ? (
                                        <p className="text-xs text-amber-600 mt-1 font-bold">Odświeżanie szkicu... ({retryCount + 1}/3)</p>
                                    ) : (
                                        <p className="text-xs text-slate-500 mt-1">Szkicowanie czystych konturów</p>
                                    )}
                                </div>
                            )}
                            
                            {imageUrl ? (
                                <img 
                                    src={imageUrl} 
                                    alt="Gotowa kolorowanka" 
                                    className={`w-full h-full object-contain transition-opacity duration-300 ${isLoadingImage ? 'opacity-0' : 'opacity-100'}`} 
                                    onLoad={handleImageLoad}
                                    onError={handleImageError}
                                />
                            ) : (
                                <p className="text-slate-400 font-medium text-center px-4">
                                    Tutaj pojawi się Twoja gotowa do druku kolorowanka
                                </p>
                            )}
                        </div>
                        
                        {/* Wersja mobilna modułu napiwków (pokazuje się tylko na telefonach na samym dole) */}
                        <div className="w-full mt-8 md:hidden">
                            <div className="bg-slate-800 p-6 rounded-3xl text-white shadow-xl relative overflow-hidden">
                                <div className="absolute -right-6 -top-6 w-24 h-24 bg-amber-500 rounded-full blur-2xl opacity-20"></div>
                                <h3 className="font-bold text-lg mb-2 relative z-10">Wspieraj projekt!</h3>
                                <p className="text-sm text-slate-300 mb-4 relative z-10">Ta aplikacja jest darmowa. Ufunduj mi wirtualną kawę!</p>
                                <div className="bg-slate-700/80 backdrop-blur border border-slate-600 rounded-xl p-4 relative z-10">
                                    <a href="https://buycoffee.to/TWOJA_NAZWA" target="_blank" rel="noopener noreferrer" className="w-full flex items-center justify-center gap-2 bg-[#ffdd00] hover:bg-[#e6c700] text-black py-2.5 rounded-lg font-bold text-sm transition-colors shadow-md">
                                        <IconCoffee /> Postaw twórcy kawę
                                    </a>
                                </div>
                            </div>
                        </div>

                    </div>

                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
