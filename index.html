<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KDP ColorAI - Generator Kolorowanek</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React i ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <!-- Babel -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-amber-50 text-slate-900 font-sans">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // Ikony SVG
        const IconPalette = () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="13.5" cy="6.5" r=".5" fill="currentColor"/><circle cx="17.5" cy="10.5" r=".5" fill="currentColor"/><circle cx="8.5" cy="7.5" r=".5" fill="currentColor"/><circle cx="6.5" cy="12.5" r=".5" fill="currentColor"/><path d="M12 2C6.5 2 2 6.5 2 12s4.5 10 10 10c.926 0 1.648-.746 1.648-1.688 0-.437-.18-.835-.437-1.125-.29-.289-.438-.652-.438-1.125a1.64 1.64 0 0 1 1.668-1.668h1.996c3.051 0 5.555-2.503 5.555-5.554C21.965 6.012 17.461 2 12 2z"/></svg>;
        const IconDownload = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" x2="12" y1="15" y2="3"/></svg>;
        const IconCoffee = () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M17 8h1a4 4 0 1 1 0 8h-1"/><path d="M3 8h14v9a4 4 0 0 1-4 4H7a4 4 0 0 1-4-4Z"/><line x1="6" x2="6" y1="2" y2="4"/><line x1="10" x2="10" y1="2" y2="4"/><line x1="14" x2="14" y1="2" y2="4"/></svg>;
        const IconLoader = () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="animate-spin"><path d="M21 12a9 9 0 1 1-6.219-8.56"/></svg>;
        const IconPrinter = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect width="12" height="8" x="6" y="14"/></svg>;

        const App = () => {
            const [prompt, setPrompt] = useState('');
            const [complexity, setComplexity] = useState('simple'); 
            const [imageUrl, setImageUrl] = useState(null); 
            const [isGenerating, setIsGenerating] = useState(false);
            const [error, setError] = useState(null);

            // FUNKCJA GENEROWANIA
            const generateColoringPage = () => {
                if (!prompt.trim()) {
                    setError("Wpisz najpierw, co sztuczna inteligencja ma narysować!");
                    return;
                }

                setIsGenerating(true);
                setError(null);

                // Tworzenie instrukcji dla AI
                const complexityText = complexity === 'simple' ? 'very simple, thick bold outlines, minimal details, for toddlers' : 'detailed, fine lines, intricate patterns, for adults';
                const enhancedPrompt = `${prompt}, coloring book page, black and white line art, clean white background, strictly black lines, no shading, no colors, no greyscale, ${complexityText}`;
                
                // Używamy losowego ziarna (seed), aby uniknąć zapamiętanych błędów
                const seed = Math.floor(Math.random() * 999999);
                
                // FINALNY LINK (Bez parametru nologo, który powodował błąd 401!)
                const finalUrl = `https://image.pollinations.ai/prompt/${encodeURIComponent(enhancedPrompt)}?width=800&height=1131&seed=${seed}`;
                
                setImageUrl(finalUrl);
                // Ponieważ ładujemy obrazek jako tag <img>, onLoad zajmie się wyłączeniem loadera
            };

            const handleDownload = () => {
                if (!imageUrl) return;
                window.open(imageUrl, '_blank');
                // Alternatywnie, by wymusić pobranie:
                const link = document.createElement('a');
                link.href = imageUrl;
                link.download = `kolorowanka-${prompt.substring(0,15)}.jpg`;
                link.click();
            };

            const handlePrint = () => {
                if (!imageUrl) return;
                const printWindow = window.open('', '_blank');
                printWindow.document.write(`
                    <html>
                        <head><title>Drukuj Kolorowankę</title></head>
                        <body style="margin:0;display:flex;justify-content:center;align-items:center;height:100vh;">
                            <img src="${imageUrl}" style="max-width:100%;max-height:100vh;" onload="window.print();window.close();" />
                        </body>
                    </html>
                `);
                printWindow.document.close();
            };

            return (
                <div className="min-h-screen p-4 md:p-8 max-w-7xl mx-auto flex flex-col md:flex-row gap-8">
                    
                    {/* LEWY PANEL - Kontrolki */}
                    <div className="w-full md:w-1/3 flex flex-col gap-6">
                        <div className="bg-white p-6 rounded-3xl shadow-lg border border-amber-100">
                            <div className="flex items-center gap-3 mb-2">
                                <div className="p-3 bg-amber-500 rounded-xl text-white shadow-md">
                                    <IconPalette />
                                </div>
                                <h1 className="text-2xl font-black text-slate-800 tracking-tight">KDP ColorAI</h1>
                            </div>
                            <p className="text-sm text-slate-500 mb-6 font-medium">Darmowy kreator kolorowanek do druku.</p>

                            {error && (
                                <div className="bg-red-50 text-red-600 p-3 rounded-xl text-xs font-bold mb-4 border border-red-100">
                                    ⚠️ {error}
                                </div>
                            )}

                            <div className="space-y-5">
                                <div className="space-y-2">
                                    <label className="text-xs font-bold text-slate-400 uppercase tracking-widest">Temat rysunku</label>
                                    <textarea 
                                        rows="3"
                                        value={prompt}
                                        onChange={(e) => setPrompt(e.target.value)}
                                        placeholder="np. uroczy kotek śpiący na księżycu"
                                        className="w-full px-4 py-3 border border-slate-200 rounded-xl focus:ring-2 focus:ring-amber-500 bg-slate-50 outline-none resize-none"
                                    />
                                </div>

                                <div className="space-y-2">
                                    <label className="text-xs font-bold text-slate-400 uppercase tracking-widest">Trudność</label>
                                    <div className="flex bg-slate-100 p-1 rounded-xl">
                                        <button 
                                            onClick={() => setComplexity('simple')}
                                            className={`flex-1 py-2 text-xs font-bold rounded-lg transition-all ${complexity === 'simple' ? 'bg-white shadow text-amber-600' : 'text-slate-500'}`}
                                        >
                                            Proste
                                        </button>
                                        <button 
                                            onClick={() => setComplexity('detailed')}
                                            className={`flex-1 py-2 text-xs font-bold rounded-lg transition-all ${complexity === 'detailed' ? 'bg-white shadow text-amber-600' : 'text-slate-500'}`}
                                        >
                                            Detale
                                        </button>
                                    </div>
                                </div>

                                <button 
                                    onClick={generateColoringPage}
                                    disabled={isGenerating || !prompt.trim()}
                                    className="w-full flex justify-center items-center gap-2 bg-amber-500 hover:bg-amber-600 disabled:bg-slate-300 text-white py-4 rounded-xl font-bold text-lg transition-all shadow-lg shadow-amber-500/30"
                                >
                                    {isGenerating ? <><IconLoader /> Tworzenie...</> : "Generuj Kolorowankę"}
                                </button>
                            </div>
                        </div>

                        {/* MODUŁ NAPIWKÓW */}
                        <div className="bg-slate-800 p-6 rounded-3xl text-white shadow-xl relative overflow-hidden mt-auto">
                            <h3 className="font-bold text-lg mb-2 relative z-10">Wspieraj projekt!</h3>
                            <p className="text-sm text-slate-300 mb-4 relative z-10">To narzędzie jest darmowe. Postaw mi wirtualną kawę, jeśli Ci pomogło!</p>
                            <a 
                                href="https://buycoffee.to/TWOJA_NAZWA" 
                                target="_blank"
                                className="w-full flex items-center justify-center gap-2 bg-[#ffdd00] hover:bg-[#e6c700] text-black py-2.5 rounded-lg font-bold text-sm transition-colors shadow-md"
                            >
                                <IconCoffee /> Postaw twórcy kawę
                            </a>
                        </div>
                    </div>

                    {/* PRAWY PANEL - Obrazek */}
                    <div className="w-full md:w-2/3 flex flex-col items-center">
                        <div className="w-full max-w-lg flex justify-between items-center mb-4 px-2">
                            <h2 className="font-bold text-slate-700">Podgląd (A4)</h2>
                            <div className="flex gap-2">
                                <button onClick={handlePrint} disabled={!imageUrl} className="flex items-center gap-1.5 px-3 py-1.5 bg-slate-200 hover:bg-slate-300 disabled:opacity-50 text-slate-700 font-bold rounded-lg text-sm transition-colors">
                                    <IconPrinter /> Drukuj
                                </button>
                                <button onClick={handleDownload} disabled={!imageUrl} className="flex items-center gap-1.5 px-3 py-1.5 bg-amber-100 hover:bg-amber-200 disabled:opacity-50 text-amber-800 font-bold rounded-lg text-sm transition-colors shadow-sm">
                                    <IconDownload /> Pobierz
                                </button>
                            </div>
                        </div>

                        <div className="relative group shadow-2xl rounded-sm overflow-hidden border border-slate-200 bg-white flex items-center justify-center" style={{ width: '100%', maxWidth: '500px', aspectRatio: '1 / 1.414' }}>
                            {isGenerating && (
                                <div className="absolute inset-0 z-20 bg-white/90 flex flex-col items-center justify-center">
                                    <div className="text-amber-500 mb-3"><IconLoader /></div>
                                    <p className="font-bold text-slate-800">Sztuczna inteligencja rysuje...</p>
                                </div>
                            )}
                            
                            {imageUrl ? (
                                <img 
                                    src={imageUrl} 
                                    alt="Kolorowanka" 
                                    className="w-full h-full object-contain" 
                                    onLoad={() => setIsGenerating(false)}
                                    onError={() => {
                                        setError("Serwer AI jest teraz zajęty. Odczekaj chwilę.");
                                        setIsGenerating(false);
                                    }}
                                />
                            ) : (
                                <p className="text-slate-400 font-medium text-center px-8 italic">
                                    Tutaj pojawi się Twoja kolorowanka po kliknięciu przycisku.
                                </p>
                            )}
                        </div>
                    </div>

                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
